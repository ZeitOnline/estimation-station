---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nodejs
  labels:
    app: nodejs
spec:
  selector:
    matchLabels:
      app: nodejs
  template:
    metadata:
      labels:
        app: nodejs
    spec:
      serviceAccountName: baseproject
      containers:
        - name: nodejs
          image: nodejs
          env:
            # Placeholder — overwritten with the deployed image tag by the
            # `replacements` in the overlay kustomization. Read at runtime by
            # the app ($env/dynamic/public), so promoting an image by re-tagging
            # (without a rebuild) still shows the right version.
            - name: PUBLIC_APP_VERSION
              value: unknown
            # Server-side token verification for the WebSocket and the Jira
            # write route — without this the app fails closed (see
            # src/routes/api/jira/story-points/+server.ts).
            - name: AUTH_MODE
              value: oidc
            - name: ALLOWED_EMAIL_DOMAINS
              value: zeit.de
          resources:
            requests:
              cpu: "0.2"
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
          envFrom:
            - secretRef:
                name: jira-secrets
