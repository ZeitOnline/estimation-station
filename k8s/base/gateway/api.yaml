apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: api
spec:
  hostnames:
    - "set by kustomize"
  parentRefs:
    - kind: Gateway
      name: envoy-internal
      namespace: cluster-infra-envoy-gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: nodejs
          port: 80
