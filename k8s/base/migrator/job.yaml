# The migrator runs once as a Job: applies migrations + auth.sql + api.sql,
# then completes. Re-run it after adding a migration:
#   kubectl delete job migrator && kubectl apply -k k8s/devel
# (Tilt does this for you automatically when files change.)
apiVersion: batch/v1
kind: Job
metadata:
  name: migrator
  labels:
    app: migrator
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: migrator
    spec:
      restartPolicy: Never
      initContainers:
        - name: wait-for-postgres
          image: postgres:17-alpine
          command: ["sh", "-c", "until pg_isready -h postgres -U app; do echo waiting for postgres; sleep 2; done"]
      containers:
        - name: migrator
          image: app/migrator
          env:
            - name: PGHOST
              value: postgres
            - name: PGPORT
              value: "5432"
            - name: PGDATABASE
              value: app
            - name: PGUSER
              value: app
            - name: PGPASSWORD
              value: app
