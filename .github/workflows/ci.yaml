name: CI
on:
  workflow_dispatch:
  push:
    branches:
      - 'main'
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  linter:
    uses: zeitonline/gh-action-workflows/.github/workflows/lefthook.yaml@89c86adf124007d97fae113c3e0c176e9c8391c6 # 4.1.0
    with:
      node-version: "lts/*"
      setup-command: |
        uv tool install lefthook
        cd frontend/
        npm install
  k8s:
    uses: zeitonline/gh-action-workflows/.github/workflows/k8s-validation.yaml@89c86adf124007d97fae113c3e0c176e9c8391c6 # 4.1.0
  # run 'release-please' first
  release-please:
    needs: [linter, k8s]
    uses: zeitonline/gh-action-workflows/.github/workflows/release-please.yaml@89c86adf124007d97fae113c3e0c176e9c8391c6 # 4.1.0
    secrets: inherit
  # without release: build new images for 'staging'
  build:
    needs: release-please
    if: ${{ ! needs.release-please.outputs.release_created }}
    uses: zeitonline/gh-action-workflows/.github/workflows/build-test-push.yaml@89c86adf124007d97fae113c3e0c176e9c8391c6 # 4.1.0
    secrets: inherit
    with:
      service: frontend
      targets: nodejs
      versions: k8s/staging/versions
  # with release: promote images to 'production' and notify
  promote-images:
    needs: release-please
    if: needs.release-please.outputs.release_created
    uses: zeitonline/gh-action-workflows/.github/workflows/add-tag.yaml@89c86adf124007d97fae113c3e0c176e9c8391c6 # 4.1.0
    secrets: inherit
    with:
      tag: ${{ needs.release-please.outputs.tag_name }}
  notify:
    needs: release-please
    if: needs.release-please.outputs.release_created
    uses: zeitonline/gh-action-workflows/.github/workflows/release-notification.yaml@89c86adf124007d97fae113c3e0c176e9c8391c6 # 4.1.0
    secrets: inherit
    with:
      environment: production
      version: ${{ needs.release-please.outputs.tag_name }}
      emoji: poker
