---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nodejs
  labels:
    app: nodejs
spec:
  selector:
    matchLabels:
      app: nodejs
  template:
    metadata:
      labels:
        app: nodejs
    spec:
      serviceAccountName: baseproject
      containers:
        - name: nodejs
          image: nodejs
          resources:
            requests:
              cpu: "0.2"
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
