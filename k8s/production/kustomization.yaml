apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: estimation-station

resources:
  - ../base/nodejs
  - ../base/gateway

components:
  - versions
  - ../base/registry

replicas:
  - name: nodejs
    count: 1

patches:
  - target:
      kind: HTTPRoute
      group: gateway.networking.k8s.io
      name: api
    patch: |-
      - op: replace
        path: /spec/hostnames/0
        value: estimation-station.zon.zeit.de
