# devel overlay: what you actually deploy to a local cluster (kind/minikube).
# It puts everything in the `learn` namespace and maps the built image names.
#
# This is the file Tilt points at, and what you'd `kubectl apply -k k8s/devel`.
# In a real ZEIT repo you'd also have staging/ and production/ overlays here.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: estimation-station

resources:
  - ../base
