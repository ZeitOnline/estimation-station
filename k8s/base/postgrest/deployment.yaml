# PostgREST: reads the `api` schema and serves it as REST on :3000.
# An initContainer blocks startup until Postgres answers, so we don't crash-loop
# on boot.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgrest
  labels:
    app: postgrest
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgrest
  template:
    metadata:
      labels:
        app: postgrest
    spec:
      initContainers:
        - name: wait-for-postgres
          image: postgres:17-alpine
          command: ["sh", "-c", "until pg_isready -h postgres -U app; do echo waiting for postgres; sleep 2; done"]
      containers:
        - name: postgrest
          image: postgrest/postgrest:v13.0.8
          envFrom:
            - configMapRef:
                name: postgrest-config
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet:
              path: /rpc/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgrest-config
data:
  PGRST_DB_URI: "postgres://authenticator:postgrest_pw@postgres:5432/app"
  PGRST_DB_SCHEMA: "api"
  PGRST_DB_ANON_ROLE: "anon"
